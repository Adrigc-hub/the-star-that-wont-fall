<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tundra Tales</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 640px;
            height: 480px;
            border: 4px solid #fff;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            /* Clave para mantener el estilo Pixel Art nítido */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        /* Pantalla de Carga */
        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }
        .loading-text {
            font-size: 20px;
            margin-top: 20px;
            letter-spacing: 2px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <!-- Pantalla de carga con el Protogen -->
    <div id="loadingScreen">
        <canvas id="loadingCanvas" width="160" height="120"></canvas>
        <div class="loading-text" id="loadingText">INICIANDO SISTEMA...</div>
    </div>
    
    <!-- Lienzo del juego principal -->
    <canvas id="gameCanvas" width="320" height="240"></canvas>
</div>

<script>
// --- CONFIGURACIÓN GENERAL ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const loadCanvas = document.getElementById('loadingCanvas');
const loadCtx = loadCanvas.getContext('2d');
const loadingScreen = document.getElementById('loadingScreen');
const loadingText = document.getElementById('loadingText');

// Desactivar suavizado de imágenes para pixel art en JS
ctx.imageSmoothingEnabled = false;
loadCtx.imageSmoothingEnabled = false;

// --- ESTADOS DEL JUEGO ---
let gameState = "LOADING"; 
let keys = {};

// Escuchar teclado
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// --- MODELOS PIXEL ART (Renderizados mediante código temporalmente) ---

// Protogen (Para la pantalla de carga y encuentros)
function drawProtogen(context, x, y, size) {
    context.fillStyle = "#222"; // Cuerpo/Orejas mecánicas
    context.fillRect(x - size, y - size, size * 2, size * 2); // Cabeza base
    context.fillRect(x - size, y - size * 1.5, size * 0.4, size); // Oreja Izq
    context.fillRect(x + size * 0.6, y - size * 1.5, size * 0.4, size); // Oreja Der

    // Visor LED (Curvo/Inclinado)
    context.fillStyle = "#0a0a0a";
    context.strokeStyle = "#00ffcc"; // Contorno brillante (Cyan)
    context.lineWidth = 2;
    context.beginPath();
    context.roundRect(x - size * 0.7, y - size * 0.5, size * 1.5, size * 1.1, 8);
    context.fill();
    context.stroke();

    // Ojos/Expresión digital en el visor (Estilo Sans)
    context.fillStyle = "#00ffcc";
    // Ojo Izquierdo parpadeando o estático
    context.fillRect(x - size * 0.3, y - size * 0.1, 4, 4);
    // Ojo Derecho "Sans" (Brilla con fuego/energía en la ruta genocida)
    if (Math.sin(Date.now() / 100) > 0) {
        context.fillStyle = "#00ffcc";
    } else {
        context.fillStyle = "#0088aa";
    }
    context.fillRect(x + size * 0.2, y - size * 0.1, 4, 4);
}

// Zorro Ártico (Personaje Principal)
const player = {
    x: 150,
    y: 110,
    width: 16,
    height: 16,
    speed: 1.5,
    color: "#ffffff",
    draw: function() {
        // Cuerpo (Blanco)
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y + 4, 16, 12); // Tronco
        ctx.fillRect(this.x + 3, this.y, 10, 8);  // Cabeza
        
        // Orejas
        ctx.fillRect(this.x + 3, this.y - 3, 3, 3);
        ctx.fillRect(this.x + 10, this.y - 3, 3, 3);

        // Cola esponjosa
        ctx.fillStyle = "#e0f7fa"; 
        ctx.fillRect(this.x - 6, this.y + 6, 8, 8);

        // Ojos negros y nariz
        ctx.fillStyle = "#000000";
        ctx.fillRect(this.x + 5, this.y + 3, 2, 2);
        ctx.fillRect(this.x + 9, this.y + 3, 2, 2);
        ctx.fillRect(this.x + 7, this.y + 5, 2, 1); // Nariz

        // Bufanda azul (Detalle único)
        ctx.fillStyle = "#00bcd4";
        ctx.fillRect(this.x + 2, this.y + 7, 12, 3);
        ctx.fillRect(this.x + 10, this.y + 10, 3, 5); // Extremo colgando
    }
};

// --- DISEÑO DE MAPAS ORIGINALES (Por zonas temáticas) ---
const maps = {
    0: {
        theme: "TUNDRA_HELADA",
        bgColor: "#0f172a",
        obstacles: [
            {x: 0, y: 0, w: 320, h: 20}, // Límite superior
            {x: 0, y: 220, w: 320, h: 20}, // Límite inferior
            {x: 0, y: 20, w: 20, h: 200}, // Límite izquierdo
            // Rocas de hielo internas
            {x: 80, y: 60, w: 40, h: 40},
            {x: 200, y: 120, w: 40, h: 40}
        ],
        drawDetails: function() {
            // Nieve en el suelo
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(40, 40, 10, 10);
            ctx.fillRect(250, 180, 15, 10);
        }
    },
    1: {
        theme: "CUEVA_CRISTAL",
        bgColor: "#1e1b4b",
        obstacles: [
            {x: 0, y: 0, w: 320, h: 20},
            {x: 0, y: 220, w: 320, h: 20},
            {x: 300, y: 20, w: 20, h: 200}, // Límite derecho tapado
            {x: 100, y: 20, w: 30, h: 100}, // Columnas de cristales
            {x: 180, y: 120, w: 30, h: 100}
        ],
        drawDetails: function() {
            // Cristales brillantes (Cian y violeta)
            ctx.fillStyle = "#818cf8";
            ctx.fillRect(110, 40, 10, 20);
            ctx.fillStyle = "#c084fc";
            ctx.fillRect(190, 160, 10, 20);
        }
    }
};

let currentMapIndex = 0;

// --- SISTEMA DE COLISIONES ---
function checkCollision(x, y, width, height) {
    const obstacles = maps[currentMapIndex].obstacles;
    for (let obs of obstacles) {
        if (x < obs.x + obs.w &&
            x + width > obs.x &&
            y < obs.y + obs.h &&
            y + height > obs.y) {
            return true;
        }
    }
    return false;
}

// --- PANTALLA DE CARGA ACTIVA (CON EL PROTOGEN) ---
let loadProgress = 0;
function runLoadingScreen() {
    loadCtx.fillStyle = "#000000";
    loadCtx.fillRect(0, 0, loadCanvas.width, loadCanvas.height);
    
    // Dibujamos al Protogen en el centro de la pantalla de carga
    drawProtogen(loadCtx, loadCanvas.width / 2, loadCanvas.height / 2 - 10, 15);
    
    // Progreso artificial de carga
    loadProgress += 0.5;
    if (loadProgress >= 100) {
        // Desvanecer pantalla de carga
        loadingScreen.style.opacity = 0;
        setTimeout(() => {
            loadingScreen.style.display = "none";
            gameState = "PLAYING";
        }, 1000);
    } else {
        loadingText.innerText = "SISTEMA CARGANDO... " + Math.floor(loadProgress) + "%";
        requestAnimationFrame(runLoadingScreen);
    }
}

// --- BUCLE DE JUEGO PRINCIPAL ---
function update() {
    if (gameState !== "PLAYING") return;

    let nextX = player.x;
    let nextY = player.y;

    // Controles de dirección
    if (keys["ArrowUp"] || keys["w"]) nextY -= player.speed;
    if (keys["ArrowDown"] || keys["s"]) nextY += player.speed;
    if (keys["ArrowLeft"] || keys["a"]) nextX -= player.speed;
    if (keys["ArrowRight"] || keys["d"]) nextX += player.speed;

    // Comprobar colisiones antes de mover
    if (!checkCollision(nextX, player.y, player.width, player.height)) {
        player.x = nextX;
    }
    if (!checkCollision(player.x, nextY, player.width, player.height)) {
        player.y = nextY;
    }

    // --- CAMBIO DE MAPAS (TEMAS ORIGINALES) ---
    // Si cruza la derecha, pasa al mapa 1 (Cueva de Cristal)
    if (player.x > 310 && currentMapIndex === 0) {
        currentMapIndex = 1;
        player.x = 25; // Aparece al lado izquierdo del nuevo mapa
    }
    // Si regresa por la izquierda, vuelve al mapa 0 (Tundra Helada)
    if (player.x < 10 && currentMapIndex === 1) {
        currentMapIndex = 0;
        player.x = 295; // Aparece al lado derecho
    }
}

function render() {
    if (gameState !== "PLAYING") return;

    const currentMap = maps[currentMapIndex];

    // Fondo del mapa actual
    ctx.fillStyle = currentMap.bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dibujar obstáculos del mapa
    ctx.fillStyle = "#475569"; // Color de roca / paredes pixeladas
    currentMap.obstacles.forEach(obs => {
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        // Borde interior para dar volumen de pixel art
        ctx.strokeStyle = "#334155";
        ctx.lineWidth = 1;
        ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
    });

    // Dibujar detalles temáticos de fondo
    currentMap.drawDetails();

    // Dibujar al Protagonista (Zorro Ártico)
    player.draw();

    // Dibujar al Protogen si está en el mapa actual (Ejemplo: En la Cueva de Cristal)
    if (currentMapIndex === 1) {
        drawProtogen(ctx, 150, 70, 10);
    }
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

// --- INICIALIZACIÓN ---
runLoadingScreen();
gameLoop();

</script>
</body>
</html>
