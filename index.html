<script>

// --- 3. CLASE DE GESTIÓN DE INPUT ---
class InputManager {
    constructor() {
        this.keys = {};
        window.addEventListener('keydown', (e) => this.keys[e.key] = true);
        window.addEventListener('keyup', (e) => this.keys[e.key] = false);
    }
    isPressed(key) { return !!this.keys[key]; }
}

// --- 4. CLASE MOTOR DE BATTLE (BULLET HELL AVANZADO) ---
class BattleSystem {
    constructor(engine) {
        this.engine = engine;
        this.bullets = [];
        this.phase = 0;
    }
    
    // Generación de patrones complejos
    update() {
        if(Math.random() < 0.15) {
            this.bullets.push({ 
                x: Math.random() * 900, 
                y: -10, 
                vx: (Math.random() - 0.5) * 4, 
                vy: 3 + Math.random() * 2 
            });
        }
        this.bullets.forEach(b => {
            b.x += b.vx;
            b.y += b.vy;
        });
        // Limpieza de balas fuera de pantalla
        this.bullets = this.bullets.filter(b => b.y < 700);
    }

    render(ctx) {
        ctx.fillStyle = "red";
        this.bullets.forEach(b => ctx.fillRect(b.x, b.y, 8, 8));
        ctx.fillStyle = "white";
        ctx.fillText("BATTLE MODE - Evade los proyectiles", 50, 50);
    }
}

// --- 5. CLASE BANCA Y PERSISTENCIA ---
class BenchSystem {
    constructor(engine) {
        this.engine = engine;
    }
    interact() {
        this.engine.state = ENGINE_CONFIG.STATES.REST;
        document.getElementById('uiLayer').style.display = 'block';
        document.getElementById('uiLayer').innerHTML = `
            <h1>BANCA DE DESCANSO</h1>
            <div class="btn" onclick="game.save()">GUARDAR PARTIDA</div>
            <div class="btn" onclick="game.manageCharms()">GESTIONAR CHARMS</div>
            <div class="btn" onclick="game.closeUI()">SALIR</div>
        `;
    }
    saveData(data) {
        localStorage.setItem("tundra_save", JSON.stringify(data));
        alert("Proceso de guardado completado.");
    }
}

// --- 6. CLASE CORE ENGINE (LA MÁQUINA PRINCIPAL) ---
class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.state = ENGINE_CONFIG.STATES.EXPLORE;
        this.player = { x: 450, y: 350, charms: [] };
        this.input = new InputManager();
        this.battle = new BattleSystem(this);
        this.bench = new BenchSystem(this);
        
        this.run();
    }

    run() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.run());
    }

    update() {
        if(this.state === ENGINE_CONFIG.STATES.EXPLORE) {
            if(this.input.isPressed("ArrowUp")) this.player.y -= 5;
            if(this.input.isPressed("z")) this.bench.interact();
        } else if(this.state === ENGINE_CONFIG.STATES.BATTLE) {
            this.battle.update();
        }
    }

    draw() {
        this.ctx.fillStyle = "black";
        this.ctx.fillRect(0,0,900,700);
        
        if(this.state === ENGINE_CONFIG.STATES.EXPLORE) {
            // Dibujar NPCs
            this.ctx.fillStyle = "yellow";
            NPC_DATABASE.forEach(n => this.ctx.fillRect(n.x, n.y, 20, 20));
            // Dibujar Player
            this.ctx.fillStyle = "white";
            this.ctx.fillRect(this.player.x, this.player.y, 30, 30);
        } else if(this.state === ENGINE_CONFIG.STATES.BATTLE) {
            this.battle.render(this.ctx);
        }
    }

    save() { this.bench.saveData(this.player); }
    closeUI() {
        document.getElementById('uiLayer').style.display = 'none';
        this.state = ENGINE_CONFIG.STATES.EXPLORE;
    }
    manageCharms() { alert("Sistema de Charms: Equipado con Furia de Nieve."); }
}

// --- 7. INICIALIZACIÓN ---
const game = new Game();
